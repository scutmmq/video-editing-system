<!DOCTYPE html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="supabase-url" content="https://wwqgixluxlegrttyhrgy.supabase.co">
  <meta name="supabase-publishable-key" content="sb_publishable_iDk4GcRCwlvD2M3NF0Oi7Q_T5mtPf5H">
  <title>轻量级视频剪辑与多媒体处理系统</title>
  <link rel="icon" href="/src/assets/favicon.ico" type="image/x-icon" sizes="any">
  <link rel="icon" href="/src/assets/icon-32x32.png" type="image/png" sizes="32x32">
  <link rel="icon" href="/src/assets/icon-16x16.png" type="image/png" sizes="16x16">
  <link rel="apple-touch-icon" href="/src/assets/icon-180x180.png">
  <link rel="manifest" href="/src/assets/site.webmanifest">
  <!-- 主题早应用，避免暗色模式刷新闪白 -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem('theme');
        if (!t) t = (window.matchMedia && matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
        if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
      } catch (e) { /* ignore */ }
    })();
  </script>
  <link rel="stylesheet" href="/src/styles/style.css">
</head>
<body>
  <!-- 背景装饰光晕 -->
  <div class="bg-glow">
    <div class="bg-glow-orb bg-glow-orb--1"></div>
    <div class="bg-glow-orb bg-glow-orb--2"></div>
  </div>

  <div id="appRoot"></div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/gsap.min.js"></script>
  <script src="/node_modules/@ffmpeg/ffmpeg/dist/umd/ffmpeg.js"></script>
  <script src="/src/vendor/supabase.js"></script>
  <script src="/src/pages/mainPage.js"></script>
  <script src="/src/config/supabaseClient.js"></script>
  <script src="/src/auth/jwtToken.js"></script>
  <script src="/src/auth/auth.js"></script>
  <script src="/src/auth/authGuard.js"></script>
  <script src="/src/modules/utils.js"></script>
  <script src="/src/modules/toolDefaults.js"></script>
  <script src="/src/modules/ffmpeg.js"></script>
  <script src="/src/modules/status.js"></script>
  <script src="/src/modules/upload.js"></script>
  <script src="/src/modules/preview.js"></script>
  <script src="/src/modules/trim.js"></script>
  <script src="/src/modules/trimRange.js"></script>
  <script src="/src/modules/gif.js"></script>
  <script src="/src/modules/audio.js"></script>
  <script src="/src/modules/watermark.js"></script>
  <script src="/src/modules/filter.js"></script>
  <script src="/src/modules/cover.js"></script>
  <script src="/src/modules/transform.js"></script>
  <script src="/src/modules/transcode.js"></script>
  <script src="/src/modules/speed.js"></script>
  <script src="/src/modules/audioAdjust.js"></script>
  <script src="/src/services/historyMeta.js"></script>
  <script src="/src/services/storageService.js"></script>
  <script src="/src/services/projectService.js"></script>
  <script src="/src/services/assetService.js"></script>
  <script src="/src/services/jobService.js"></script>
  <script src="/src/modules/confirmDialog.js"></script>
  <script src="/src/modules/history.js"></script>
  <script src="/src/modules/assets.js"></script>
  <script src="/src/modules/app.js"></script>

  <!-- GSAP 主界面动画 -->
  <script>
    (function () {
      if (typeof gsap === 'undefined') return;

      var mm = gsap.matchMedia();

      // 入场动画：等待布局渲染完成后执行
      var observer = new MutationObserver(function onMutate() {
        var navbar = document.querySelector('.navbar');
        var sidebar = document.querySelector('.sidebar');
        var main = document.querySelector('.main-content');
        if (!navbar || !sidebar || !main) return;
        observer.disconnect();

        mm.add('(prefers-reduced-motion: no-preference)', function () {
          var tl = gsap.timeline({ defaults: { ease: 'power3.out' } });

          // 背景光晕淡入
          tl.fromTo('.bg-glow-orb',
            { scale: 0, opacity: 0 },
            { scale: 1, opacity: 1, duration: 1.2, ease: 'power4.out' },
            0
          );

          // 导航栏下滑
          tl.fromTo(navbar,
            { y: -40, opacity: 0 },
            { y: 0, opacity: 1, duration: 0.5 },
            0.1
          );

          // 侧边栏从左滑入
          tl.fromTo(sidebar,
            { x: -60, opacity: 0 },
            { x: 0, opacity: 1, duration: 0.55 },
            0.18
          );

          // 主内容区淡入
          tl.fromTo(main,
            { opacity: 0, y: 16 },
            { opacity: 1, y: 0, duration: 0.45 },
            0.25
          );

          // 上传区横幅微弹
          tl.fromTo('.upload-banner',
            { opacity: 0, scale: 0.97 },
            { opacity: 1, scale: 1, duration: 0.5, ease: 'back.out(1.4)' },
            0.4
          );

          // 状态栏淡入
          tl.fromTo('#statusBar',
            { opacity: 0, y: 8 },
            { opacity: 1, y: 0, duration: 0.35 },
            0.5
          );

          // 工具标签按钮依次出现
          tl.fromTo('.tab',
            { opacity: 0, x: -12 },
            { opacity: 1, x: 0, stagger: 0.04, duration: 0.3, ease: 'power2.out' },
            0.2
          );
        });

        // 按钮悬浮微动（全局）
        setupButtonHovers();
      });

      observer.observe(document.getElementById('appRoot'), { childList: true, subtree: true });

      function setupButtonHovers() {
        // 使用事件委托，避免重复绑定
        document.addEventListener('mouseenter', function (e) {
          var btn = e.target.closest('.btn, .tab, .view-tab');
          if (!btn || btn.disabled || btn.classList.contains('btn-loading')) return;
          gsap.to(btn, { y: -2, scale: 1.02, duration: 0.2, ease: 'power2.out', overwrite: 'auto' });
        }, true);

        document.addEventListener('mouseleave', function (e) {
          var btn = e.target.closest('.btn, .tab, .view-tab');
          if (!btn) return;
          gsap.to(btn, { y: 0, scale: 1, duration: 0.2, ease: 'power2.out', overwrite: 'auto' });
        }, true);
      }
    })();
  </script>
</body>
</html>
