    (function () {
      try {
        var t = localStorage.getItem('theme');
        if (!t) t = (window.matchMedia && matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
        if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
      } catch (e) { /* ignore */ }
    })();
  </script>
